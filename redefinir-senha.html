<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redefinir Senha | Lumina Interactive</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar">
  <div class="logo"><img src="logo.png" alt="Lumina Interactive" style="height:36px;width:auto;display:block"></div>
  <div class="menu" id="menuDinamico">
    <a href="index.html">Início</a>
  </div>
</nav>

<div class="page-wrap" style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
  <div class="form-card" style="width:100%;max-width:460px;margin:40px auto;opacity:1;transform:none">
    <div class="badge" style="margin-bottom:24px">Segurança</div>
    <h2>Nova senha</h2>
    <p>Digite sua nova senha para acessar sua conta.</p>

    <div id="msgErro" style="display:none;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#ef4444;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px"></div>
    <div id="msgSucesso" style="display:none;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);color:#22c55e;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px"></div>

    <div class="field">
      <label>Nova senha</label>
      <input type="password" id="novaSenha" placeholder="Mínimo 6 caracteres">
    </div>
    <div class="field">
      <label>Confirmar nova senha</label>
      <input type="password" id="confirmarSenha" placeholder="Repita a nova senha">
    </div>
    <button class="btn primary" id="btnRedefinir" style="width:100%" onclick="redefinirSenha()">Salvar nova senha</button>
  </div>
</div>

<footer class="footer">
  <div class="footer-logo"><img src="logo.png" alt="Lumina Interactive" style="height:32px;width:auto;opacity:0.85"></div>
    <div class="footer-links" id="footerDinamico"></div>
<div class="footer-copy">© 2026 Lumina Interactive™. Todos os direitos reservados.</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="site-nav.js"></script>
<script src="navbar-auth.js"></script>
<script>
const supabaseClient = supabase.createClient(
  "https://tqsalhscgkepttbczyjq.supabase.co",
  "sb_publishable_Q99EhX_HpUVotGGqmWAf4A_pkiTB7bK"
);

function mostrarErro(msg) {
  const el = document.getElementById("msgErro");
  el.textContent = msg; el.style.display = "block";
  document.getElementById("msgSucesso").style.display = "none";
}
function mostrarSucesso(msg) {
  const el = document.getElementById("msgSucesso");
  el.textContent = msg; el.style.display = "block";
  document.getElementById("msgErro").style.display = "none";
}

async function redefinirSenha() {
  const nova    = document.getElementById("novaSenha").value;
  const confirmar = document.getElementById("confirmarSenha").value;
  const btn = document.getElementById("btnRedefinir");

  if (nova.length < 6) { mostrarErro("A senha precisa ter ao menos 6 caracteres."); return; }
  if (nova !== confirmar) { mostrarErro("As senhas não coincidem."); return; }

  btn.textContent = "Salvando..."; btn.disabled = true;

  const { error } = await supabaseClient.auth.updateUser({ password: nova });

  btn.textContent = "Salvar nova senha"; btn.disabled = false;

  if (error) { mostrarErro(error.message); return; }

  mostrarSucesso("Senha redefinida com sucesso! Redirecionando para o login...");
  setTimeout(() => { window.location.href = "login.html"; }, 2500);
}
</script>
</body>
</html>
