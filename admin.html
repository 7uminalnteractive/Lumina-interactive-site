<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumina Admin</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
  <div class="logo">LUMINA ADMIN</div>
  <div class="menu">
    <a href="index.html">Site</a>
    <a href="minha-conta.html">Minha conta</a>
  </div>
</nav>

<main class="container">
<section>

<h1>Painel administrativo</h1>

<div class="cards">
  <div class="card">
    <h3>Total de pedidos</h3>
    <div class="price" id="totalPedidos">0</div>
  </div>

  <div class="card">
    <h3>Assinaturas ativas</h3>
    <div class="price" id="totalAtivos">0</div>
  </div>

  <div class="card">
    <h3>Pendentes</h3>
    <div class="price" id="totalPendentes">0</div>
  </div>
</div>

<div class="form-card" style="margin-top:30px;">
  <h2>Filtrar pedidos</h2>

  <select id="filtroStatus" onchange="carregarPedidos()">
    <option value="todos">Todos</option>
    <option value="pendente">Pendentes</option>
    <option value="ativa">Ativos</option>
    <option value="recusada">Recusados</option>
    <option value="cancelada">Cancelados</option>
    <option value="aguardando_pagamento">Aguardando pagamento</option>
  </select>
</div>

<div id="pedidosArea"></div>

</section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const SUPABASE_URL =
"https://tqsalhscgkepttbczyjq.supabase.co";

const SUPABASE_KEY =
"sb_publishable_Q99EhX_HpUVotGGqmWAf4A_pkiTB7bK";

const supabaseClient =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

function formatarData(data){
  if(!data) return "Não definido";

  return new Date(data).toLocaleString(
    "pt-BR",
    {
      day:"2-digit",
      month:"long",
      year:"numeric",
      hour:"2-digit",
      minute:"2-digit"
    }
  );
}

async function carregarPedidos(){

  const area =
  document.getElementById("pedidosArea");

  const filtro =
  document.getElementById("filtroStatus").value;

  let query =
  supabaseClient
  .from("pedidos")
  .select("*")
  .order("id",{ascending:false});

  if(filtro !== "todos"){
    query = query.eq("status",filtro);
  }

  const { data, error } = await query;

  if(error){
    area.innerHTML = `
      <div class="card">
        Erro ao carregar pedidos.
      </div>
    `;
    console.log(error);
    return;
  }

  atualizarResumo();

  if(data.length === 0){
    area.innerHTML = `
      <div class="card">
        Nenhum pedido encontrado.
      </div>
    `;
    return;
  }

  area.innerHTML = "";

  data.forEach((p)=>{

    area.innerHTML += `

      <div class="card">

        <span class="badge">
          ${p.status || "pendente"}
        </span>

        <h3>
          ${p.produto || "Produto"}
        </h3>

        <p>
          <strong>Cliente:</strong>
          ${p.nome_cliente || ""}
        </p>

        <p>
          <strong>Email:</strong>
          ${p.email || ""}
        </p>

        <p>
          <strong>WhatsApp:</strong>
          ${p.whatsapp || ""}
        </p>

        <p>
          <strong>Valor:</strong>
          R$ ${Number(p.valor || 0).toFixed(2)}
        </p>

        <p>
          <strong>Pagamento:</strong>
          ${p.metodo_pagamento || "Manual"}
        </p>

        <p>
          <strong>Acesso liberado:</strong>
          ${p.acesso_liberado ? "Sim" : "Não"}
        </p>

        <p>
          <strong>Data do pagamento:</strong>
          ${formatarData(p.data_pagamento)}
        </p>

        <p>
          <strong>Válido até:</strong>
          ${formatarData(p.data_fim)}
        </p>

        <p>
          <strong>Comprovante:</strong>
        </p>

        ${
          p.comprovante_url
          ?
          `
          <a
          href="${p.comprovante_url}"
          target="_blank"
          rel="noopener noreferrer"
          class="btn secondary"
          style="margin-bottom:15px;"
          >
            Ver comprovante
          </a>
          `
          :
          `
          <p style="color:#f59e0b;">
            Comprovante não enviado.
          </p>
          `
        }

        <p>
          <strong>Download liberado:</strong>
          ${p.download_url ? "Sim" : "Não"}
        </p>

        <div style="
          display:grid;
          grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
          gap:10px;
          margin-top:15px;
        ">

          <button
          class="btn primary"
          onclick="aprovar(${p.id})"
          >
            Aprovar +30 dias
          </button>

          <button
          class="btn secondary"
          onclick="renovar(${p.id})"
          >
            Renovar +30 dias
          </button>

          <button
          class="btn secondary"
          onclick="recusar(${p.id})"
          >
            Recusar
          </button>

          <button
          class="btn danger"
          onclick="cancelar(${p.id})"
          >
            Cancelar acesso
          </button>

          <button
          class="btn danger"
          onclick="excluirPedido(${p.id})"
          >
            Excluir pedido
          </button>

        </div>

      </div>

    `;

  });

}

async function atualizarResumo(){

  const { data, error } =
  await supabaseClient
  .from("pedidos")
  .select("*");

  if(error || !data) return;

  document.getElementById("totalPedidos").innerText =
  data.length;

  document.getElementById("totalAtivos").innerText =
  data.filter(
    p => p.status === "ativa" &&
    p.acesso_liberado === true
  ).length;

  document.getElementById("totalPendentes").innerText =
  data.filter(
    p => p.status === "pendente" ||
    p.status === "aguardando_pagamento"
  ).length;

}

async function aprovar(id){

  const { data:pedido, error:pedidoError } =
  await supabaseClient
  .from("pedidos")
  .select("*")
  .eq("id",id)
  .single();

  if(pedidoError || !pedido){
    alert("Pedido não encontrado.");
    return;
  }

  const { data:download, error:downloadError } =
  await supabaseClient
  .from("downloads_padrao")
  .select("*")
  .eq("produto",pedido.produto)
  .eq("ativo",true)
  .single();

  if(downloadError || !download){
    alert("Download padrão não encontrado para este produto.");
    return;
  }

  const hoje = new Date();

  const fim = new Date();
  fim.setDate(fim.getDate() + 30);

  const { error } =
  await supabaseClient
  .from("pedidos")
  .update({
    status:"ativa",
    acesso_liberado:true,
    download_url:download.download_url,
    data_pagamento:hoje.toISOString(),
    data_fim:fim.toISOString()
  })
  .eq("id",id);

  if(error){
    alert(error.message);
    return;
  }

  alert("Assinatura aprovada com download automático!");
  carregarPedidos();

}

async function renovar(id){

  const { data:pedido } =
  await supabaseClient
  .from("pedidos")
  .select("*")
  .eq("id",id)
  .single();

  const { data:download } =
  await supabaseClient
  .from("downloads_padrao")
  .select("*")
  .eq("produto",pedido.produto)
  .eq("ativo",true)
  .single();

  const fim = new Date();
  fim.setDate(fim.getDate() + 30);

  const { error } =
  await supabaseClient
  .from("pedidos")
  .update({
    status:"ativa",
    acesso_liberado:true,
    download_url:download ? download.download_url : pedido.download_url,
    data_fim:fim.toISOString()
  })
  .eq("id",id);

  if(error){
    alert(error.message);
    return;
  }

  alert("Assinatura renovada por +30 dias!");
  carregarPedidos();

}

async function recusar(id){

  const confirmar =
  confirm("Tem certeza que deseja recusar esse pedido?");

  if(!confirmar) return;

  const { error } =
  await supabaseClient
  .from("pedidos")
  .update({
    status:"recusada",
    acesso_liberado:false
  })
  .eq("id",id);

  if(error){
    alert(error.message);
    return;
  }

  alert("Pedido recusado!");
  carregarPedidos();

}

async function cancelar(id){

  const confirmar =
  confirm("Deseja cancelar o acesso desse cliente?");

  if(!confirmar) return;

  const { error } =
  await supabaseClient
  .from("pedidos")
  .update({
    status:"cancelada",
    acesso_liberado:false
  })
  .eq("id",id);

  if(error){
    alert(error.message);
    return;
  }

  alert("Acesso cancelado!");
  carregarPedidos();

}

async function excluirPedido(id){

  const confirmar =
  confirm("Tem certeza que deseja excluir esse pedido?");

  if(!confirmar) return;

  const { error } =
  await supabaseClient
  .from("pedidos")
  .delete()
  .eq("id",id);

  if(error){
    alert(error.message);
    return;
  }

  alert("Pedido excluído!");
  carregarPedidos();

}

carregarPedidos();
</script>

</body>
</html>
