<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Lumina Admin</title><link rel="stylesheet" href="style.css"></head><body><nav class="navbar"><div class="logo">LUMINA INTERACTIVE™</div><div class="menu"><a href="index.html">Início</a><a href="patches.html">Patchs</a><a href="downloads.html">Downloads</a><a href="plus.html">Lumina Plus</a><a href="login.html">Login</a></div></nav><main class="container"><section><h1>Painel administrativo</h1><div class="cards"><div class="card"><h3>Total de pedidos</h3><div class="price" id="totalPedidos">0</div></div><div class="card"><h3>Assinaturas ativas</h3><div class="price" id="totalAtivos">0</div></div><div class="card"><h3>Pendentes</h3><div class="price" id="totalPendentes">0</div></div></div><div class="form-card" style="margin-top:30px"><h2>Filtrar pedidos</h2><div class="field"><select id="filtroStatus" onchange="carregarPedidos()"><option value="todos">Todos</option><option value="pendente">Pendentes</option><option value="ativa">Ativos</option><option value="recusada">Recusados</option><option value="cancelada">Cancelados</option><option value="aguardando_pagamento">Aguardando pagamento</option></select></div></div><div class="cards" id="pedidosArea" style="margin-top:25px"></div></section></main><footer class="footer"><div>Lumina Interactive™</div><div>Levando o futebol portátil a outro nível.</div></footer><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><script>
const supabaseClient=supabase.createClient("https://tqsalhscgkepttbczyjq.supabase.co","sb_publishable_Q99EhX_HpUVotGGqmWAf4A_pkiTB7bK");
function fmt(d){return d?new Date(d).toLocaleString("pt-BR",{day:"2-digit",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit"}):"Não definido"}
async function carregarPedidos(){const filtro=filtroStatus.value;let q=supabaseClient.from("pedidos").select("*").order("id",{ascending:false});if(filtro!=="todos")q=q.eq("status",filtro);const {data,error}=await q;if(error){pedidosArea.innerHTML="<div class='card'>Erro.</div>";return}atualizarResumo();pedidosArea.innerHTML=data.map(p=>`<div class="card"><span class="badge">${p.status||"pendente"}</span><h3>${p.produto||"Produto"}</h3><p><strong>Cliente:</strong> ${p.nome_cliente||""}</p><p><strong>Email:</strong> ${p.email||""}</p><p><strong>WhatsApp:</strong> ${p.whatsapp||""}</p><p><strong>Válido até:</strong> ${fmt(p.data_fim)}</p>${p.comprovante_url?`<a href="${p.comprovante_url}" target="_blank" class="btn secondary">Ver comprovante</a>`:`<p style="color:#f59e0b">Comprovante não enviado.</p>`}<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-top:15px"><button class="btn primary" onclick="aprovar(${p.id})">Aprovar +30 dias</button><button class="btn secondary" onclick="renovar(${p.id})">Renovar +30 dias</button><button class="btn secondary" onclick="recusar(${p.id})">Recusar</button><button class="btn danger" onclick="cancelar(${p.id})">Cancelar</button><button class="btn danger" onclick="excluirPedido(${p.id})">Excluir</button></div></div>`).join("")||"<div class='card'>Nenhum pedido.</div>"}
async function atualizarResumo(){const {data}=await supabaseClient.from("pedidos").select("*");if(!data)return;totalPedidos.innerText=data.length;totalAtivos.innerText=data.filter(p=>p.status==="ativa"&&p.acesso_liberado).length;totalPendentes.innerText=data.filter(p=>p.status==="pendente"||p.status==="aguardando_pagamento").length}
async function aprovar(id){const {data:p}=await supabaseClient.from("pedidos").select("*").eq("id",id).single();const {data:d}=await supabaseClient.from("downloads_padrao").select("*").eq("produto",p.produto).eq("ativo",true).single();if(!d){alert("Download padrão não encontrado.");return}let hoje=new Date(),fim=new Date();fim.setDate(fim.getDate()+30);await supabaseClient.from("pedidos").update({status:"ativa",acesso_liberado:true,download_url:d.download_url,data_pagamento:hoje.toISOString(),data_fim:fim.toISOString()}).eq("id",id);carregarPedidos()}
async function renovar(id){let fim=new Date();fim.setDate(fim.getDate()+30);await supabaseClient.from("pedidos").update({status:"ativa",acesso_liberado:true,data_fim:fim.toISOString()}).eq("id",id);carregarPedidos()}
async function recusar(id){await supabaseClient.from("pedidos").update({status:"recusada",acesso_liberado:false}).eq("id",id);carregarPedidos()}
async function cancelar(id){await supabaseClient.from("pedidos").update({status:"cancelada",acesso_liberado:false}).eq("id",id);carregarPedidos()}
async function excluirPedido(id){if(confirm("Excluir pedido?")){await supabaseClient.from("pedidos").delete().eq("id",id);carregarPedidos()}}
carregarPedidos();
</script></body></html>
