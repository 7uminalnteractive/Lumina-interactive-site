<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lumina Admin</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar">

<div class="logo">
LUMINA ADMIN
</div>

<div class="menu">

<a href="index.html">
Site
</a>

<a href="minha-conta.html">
Minha conta
</a>

</div>

</nav>

<main class="container">

<section>

<h1>
Painel administrativo
</h1>

<div class="cards">

<div class="card">

<h3>
Total de pedidos
</h3>

<div
class="price"
id="totalPedidos"
>

0

</div>

</div>

<div class="card">

<h3>
Assinaturas ativas
</h3>

<div
class="price"
id="totalAtivos"
>

0

</div>

</div>

<div class="card">

<h3>
Pendentes
</h3>

<div
class="price"
id="totalPendentes"
>

0

</div>

</div>

</div>

<div
class="form-card"
style="margin-top:30px;"
>

<h2>
Filtrar pedidos
</h2>

<select
id="filtroStatus"
onchange="carregarPedidos()"
>

<option value="todos">
Todos
</option>

<option value="pendente">
Pendentes
</option>

<option value="ativa">
Ativos
</option>

<option value="recusada">
Recusados
</option>

<option value="cancelada">
Cancelados
</option>

</select>

</div>

<div id="pedidosArea"></div>

</section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const SUPABASE_URL =
"https://tqsalhscgkepttbczyjq.supabase.co";

const SUPABASE_KEY =
"sb_publishable_Q99EhX_HpUVotGGqmWAf4A_pkiTB7bK";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

async function carregarPedidos(){

const area =
document.getElementById(
"pedidosArea"
);

const filtro =
document.getElementById(
"filtroStatus"
).value;

let query =
supabaseClient
.from("pedidos")
.select("*")
.order("id",{ascending:false});

if(filtro !== "todos"){

query =
query.eq("status",filtro);

}

const {
data,
error
}
=
await query;

if(error){

area.innerHTML =
"Erro ao carregar pedidos.";

console.log(error);

return;

}

atualizarResumo();

if(data.length === 0){

area.innerHTML = `

<div class="card">
Nenhum pedido encontrado.
</div>

`;

return;

}

area.innerHTML = "";

data.forEach((p)=>{

area.innerHTML += `

<div class="card">

<span class="badge">
${p.status || "pendente"}
</span>

<h3>
${p.produto || "Produto"}
</h3>

<p>
<strong>Cliente:</strong>
${p.nome_cliente || ""}
</p>

<p>
<strong>Email:</strong>
${p.email || ""}
</p>

<p>
<strong>WhatsApp:</strong>
${p.whatsapp || ""}
</p>

<p>
<strong>Valor:</strong>
R$ ${Number(p.valor || 0).toFixed(2)}
</p>

<p>
<strong>Pagamento:</strong>
${p.metodo_pagamento || "Manual"}
</p>

<p>
<strong>Acesso liberado:</strong>
${p.acesso_liberado ? "Sim" : "Não"}
</p>

<p>
<strong>Data do pagamento:</strong>
${p.data_pagamento || "Não aprovado"}
</p>

<p>
<strong>Válido até:</strong>
${p.data_fim || "Não definido"}
</p>

<p>
<strong>Comprovante:</strong>
</p>

${
p.comprovante_url
?
`
<a
href="${p.comprovante_url}"
target="_blank"
rel="noopener noreferrer"
class="btn secondary"
style="margin-bottom:15px;"
>

Ver comprovante

</a>
`
:
`
<p style="color:#f59e0b;">
Comprovante não enviado.
</p>
`
}

<label>
Link do download
</label>

<input
type="text"
id="download-${p.id}"
placeholder="Cole o link do download"
value="${p.download_url || ""}"
>

<div style="
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));
gap:10px;
margin-top:15px;
">

<button
class="btn primary"
onclick="aprovar(${p.id})"
>

Aprovar +30 dias

</button>

<button
class="btn secondary"
onclick="renovar(${p.id})"
>

Renovar +30 dias

</button>

<button
class="btn secondary"
onclick="recusar(${p.id})"
>

Recusar

</button>

<button
class="btn danger"
onclick="cancelar(${p.id})"
>

Cancelar acesso

</button>

<button
class="btn danger"
onclick="excluirPedido(${p.id})"
>

Excluir pedido

</button>

</div>

</div>

`;

});

}

async function atualizarResumo(){

const {
data
}
=
await supabaseClient
.from("pedidos")
.select("*");

document.getElementById(
"totalPedidos"
).innerText =
data.length;

document.getElementById(
"totalAtivos"
).innerText =
data.filter(
p =>
p.status === "ativa"
).length;

document.getElementById(
"totalPendentes"
).innerText =
data.filter(
p =>
p.status === "pendente"
).length;

}

async function aprovar(id){

const link =
document.getElementById(
`download-${id}`
).value;

if(!link){

alert(
"Coloque o link do download."
);

return;

}

const hoje =
new Date();

const fim =
new Date();

fim.setDate(
fim.getDate() + 30
);

const {
error
}
=
await supabaseClient
.from("pedidos")
.update({

status:"ativa",

acesso_liberado:true,

download_url:link,

data_pagamento:
hoje.toISOString(),

data_fim:
fim.toISOString()

})
.eq("id",id);

if(error){

alert(error.message);
return;

}

alert(
"Assinatura aprovada!"
);

carregarPedidos();

}

async function renovar(id){

const fim =
new Date();

fim.setDate(
fim.getDate() + 30
);

const {
error
}
=
await supabaseClient
.from("pedidos")
.update({

status:"ativa",

acesso_liberado:true,

data_fim:
fim.toISOString()

})
.eq("id",id);

if(error){

alert(error.message);
return;

}

alert(
"Assinatura renovada!"
);

carregarPedidos();

}

async function recusar(id){

const {
error
}
=
await supabaseClient
.from("pedidos")
.update({

status:"recusada",

acesso_liberado:false

})
.eq("id",id);

if(error){

alert(error.message);
return;

}

alert(
"Pedido recusado!"
);

carregarPedidos();

}

async function cancelar(id){

const {
error
}
=
await supabaseClient
.from("pedidos")
.update({

status:"cancelada",

acesso_liberado:false

})
.eq("id",id);

if(error){

alert(error.message);
return;

}

alert(
"Acesso cancelado!"
);

carregarPedidos();

}

async function excluirPedido(id){

const confirmar =
confirm(
"Excluir pedido?"
);

if(!confirmar) return;

const {
error
}
=
await supabaseClient
.from("pedidos")
.delete()
.eq("id",id);

if(error){

alert(error.message);
return;

}

alert(
"Pedido excluído!"
);

carregarPedidos();

}

carregarPedidos();

</script>

</body>
</html>
