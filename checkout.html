<!-- GRID -->

<div style="

<form id="checkoutForm" style="

<!-- NOME -->

<div style="
display:flex;
flex-direction:column;
gap:8px;
">

<label>
Nome completo
</label>

<input
type="text"
id="nome"
required

style="
height:58px;

border-radius:16px;

background:#070b1c;

color:white;

border:1px solid rgba(255,255,255,.08);

padding:0 18px;

font-size:17px;
"
>

</div>

<!-- EMAIL -->

<div style="
display:flex;
flex-direction:column;
gap:8px;
">

<label>
E-mail
</label>

<input
type="email"
id="email"
required

style="
height:58px;

border-radius:16px;

background:#070b1c;

color:white;

border:1px solid rgba(255,255,255,.08);

padding:0 18px;

font-size:17px;
"
>

</div>

<!-- WHATSAPP -->

<div style="
display:flex;
flex-direction:column;
gap:8px;
">

<label>
WhatsApp
</label>

<input
type="text"
id="whatsapp"
required

style="
height:58px;

border-radius:16px;

background:#070b1c;

color:white;

border:1px solid rgba(255,255,255,.08);

padding:0 18px;

font-size:17px;
"
>

</div>

<!-- PRODUTO -->

<div style="
display:flex;
flex-direction:column;
gap:8px;
">

<label>
Produto
</label>

<select
id="produto"

style="
height:58px;

border-radius:16px;

background:#070b1c;

color:white;

border:1px solid rgba(255,255,255,.08);

padding:0 18px;

font-size:17px;
"
>

<option value="Lumina Plus">
Lumina Plus
</option>

<option value="LPFL PRO">
LPFL PRO
</option>

<option value="Brazukas Patch">
Brazukas Patch
</option>

<option value="LPFL Normal">
LPFL Normal
</option>

</select>

</div>

<!-- PAGAMENTO -->

<div style="
display:flex;
flex-direction:column;
gap:8px;
">

<label>
Método de pagamento
</label>

<select
id="metodo"

style="
height:58px;

border-radius:16px;

background:#070b1c;

color:white;

border:1px solid rgba(255,255,255,.08);

padding:0 18px;

font-size:17px;
"
>

<option value="PIX">
PIX
</option>

<option value="PicPay">
PicPay
</option>

</select>

</div>

<!-- BOTÃO -->

<button
class="btn primary"
type="submit"

style="
width:100%;
height:60px;
margin-top:5px;
"
>

Continuar para pagamento

</button>

</form>

<!-- RESUMO -->

<div class="summary-card">

<span class="badge">
RESUMO

">

você será levado para o pagamento Pix.

<!-- SCRIPT MENU -->

<script>

function toggleMenu(){

document
.getElementById(
"mobileMenu"
)
.classList.toggle(
"active"
);

}

</script>

<!-- SUPABASE -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const SUPABASE_URL =
"https://tqsalhscgkepttbczyjq.supabase.co";

const SUPABASE_KEY =
"sb_publishable_Q99EhX_HpUVotGGqmWAf4A_pkiTB7bK";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

document
.getElementById(
"checkoutForm"
)
.addEventListener(
"submit",
async (e)=>{

e.preventDefault();

const pedido = {

nome_cliente:
document.getElementById(
"nome"
).value,

email:
document.getElementById(
"email"
).value,

whatsapp:
document.getElementById(
"whatsapp"
).value,

produto:
document.getElementById(
"produto"
).value,

metodo_pagamento:
document.getElementById(
"metodo"
).value,

status:
"aguardando_pagamento",

valor:9.90,

acesso_liberado:false

};

const { data, error } =
await supabaseClient
.from("pedidos")
.insert([pedido])
.select();

if(error){

alert(error.message);
return;

}

window.location.href =
"comprovante.html?pedido_id="
+ data[0].id;

}
);

</script>

</body>
