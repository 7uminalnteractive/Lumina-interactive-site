<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout | Lumina Interactive</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">

<div class="logo">
LUMINA INTERACTIVE™
</div>

<div class="nav-right">

<a href="minha-conta.html" class="profile-btn">

<img
src="https://cdn-icons-png.flaticon.com/512/847/847969.png"
class="profile-icon"
>

</a>

<button class="menu-toggle" onclick="toggleMenu()">

<span></span>
<span></span>
<span></span>

</button>

</div>

</nav>

<div class="mobile-menu" id="mobileMenu">

<a href="index.html">Início</a>
<a href="patches.html">Patchs</a>
<a href="downloads.html">Downloads</a>
<a href="plus.html">Lumina Plus</a>

</div>

<main class="container">

<section>

<div class="section-title">

<div>

<h2>Checkout</h2>

<p>
Finalize sua assinatura da Lumina Interactive.
</p>

</div>

</div>

<div class="checkout-layout">

<!-- FORM -->

<form id="checkoutForm" class="checkout-clean">

<h2>
Dados do cliente
</h2>

<div class="field">

<label>
Nome completo
</label>

<input
type="text"
id="nome"
required
>

</div>

<div class="field">

<label>
E-mail
</label>

<input
type="email"
id="email"
required
>

</div>

<div class="field">

<label>
WhatsApp
</label>

<input
type="text"
id="whatsapp"
required
>

</div>

<div class="field">

<label>
Produto
</label>

<select id="produto">

<option value="Lumina Plus">
Lumina Plus
</option>

<option value="LPFL PRO">
LPFL PRO
</option>

<option value="Brazukas Patch">
Brazukas Patch
</option>

<option value="LPFL Normal">
LPFL Normal
</option>

</select>

</div>

<div class="field">

<label>
Método de pagamento
</label>

<select id="metodo">

<option value="PIX">
PIX
</option>

<option value="PicPay">
PicPay
</option>

</select>

</div>

<button class="btn primary" type="submit">

Confirmar pedido

</button>

</form>

<!-- RESUMO -->

<div class="summary-card">

<span class="badge">
RESUMO
</span>

<h2 id="resumoProduto">
Lumina Plus
</h2>

<p class="desc">

Acesso premium da Lumina Interactive.

</p>

<div class="price">
R$ 9,90
</div>

<p style="color:var(--muted);line-height:1.6;">

Após confirmar, seu pedido será registrado no Supabase.

</p>

</div>

</div>

</section>

</main>

<script>

function toggleMenu(){

document
.getElementById(
"mobileMenu"
)
.classList.toggle(
"active"
);

}

</script>

</body>
</html>
