<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout | Lumina Interactive</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
  <div class="logo">LUMINA INTERACTIVE™</div>

  <div class="nav-right">
    <a href="minha-conta.html" class="profile-btn">
      <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" class="profile-icon">
    </a>

    <button class="menu-toggle" onclick="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <a href="index.html">Início</a>
  <a href="patches.html">Patchs</a>
  <a href="downloads.html">Downloads</a>
  <a href="plus.html">Lumina Plus</a>
  <a href="lpfl-pro.html">Comprar</a>
</div>

<main class="container">

<section>
  <div class="section-title">
    <div>
      <h2>Checkout</h2>
      <p>Finalize sua assinatura da Lumina Interactive.</p>
    </div>
  </div>

  <div class="checkout-layout">

    <form class="form-card" id="checkoutForm">

      <h2>Dados do cliente</h2>

      <label>Nome completo</label>
      <input type="text" id="nome" required>

      <label>E-mail</label>
      <input type="email" id="email" required>

      <label>WhatsApp</label>
      <input type="text" id="whatsapp" required>

      <label>Produto</label>
      <select id="produto">
        <option value="Lumina Plus">Lumina Plus</option>
        <option value="LPFL PRO">LPFL PRO</option>
        <option value="Brazukas Patch">Brazukas Patch</option>
        <option value="LPFL Normal">LPFL Normal</option>
      </select>

      <label>Método de pagamento</label>
      <select id="metodo">
        <option value="PIX">PIX</option>
        <option value="PicPay">PicPay</option>
      </select>

      <div class="pay-method">
        <button type="button">PIX</button>
        <button type="button">Cartão</button>
      </div>

      <button class="btn primary" type="submit" style="width:100%;">
        Confirmar pedido
      </button>

    </form>

    <div class="summary-card">

      <span class="badge">RESUMO</span>

      <h2 id="resumoProduto">Lumina Plus</h2>

      <p class="desc" id="resumoDescricao" style="font-size:17px;">
        Acesso premium da Lumina Interactive.
      </p>

      <div class="price" id="resumoPreco">
        R$ 9,90
      </div>

      <p style="color:var(--muted);line-height:1.6;">
        Após confirmar, seu pedido será registrado no Supabase.
      </p>

    </div>

  </div>
</section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
function toggleMenu(){
  document.getElementById("mobileMenu").classList.toggle("active");
}

const SUPABASE_URL = "https://tqsalhscgkepttbczyjq.supabase.co";
const SUPABASE_KEY = "sb_publishable_Q99EhX_HpUVotGGqmWAf4A_pkiTB7bK";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

document.getElementById("checkoutForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const pedido = {
    nome_cliente: document.getElementById("nome").value,
    email: document.getElementById("email").value,
    whatsapp: document.getElementById("whatsapp").value,
    produto: document.getElementById("produto").value,
    metodo_pagamento: document.getElementById("metodo").value,
    status: "aguardando_pagamento",
    valor: 9.90,
    acesso_liberado: false
  };

  const { data, error } = await supabaseClient
    .from("pedidos")
    .insert([pedido])
    .select();

  if(error){
    alert(error.message);
    return;
  }

  window.location.href = "comprovante.html?pedido_id=" + data[0].id;
});
</script>

</body>
</html>
