<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout | Lumina Interactive</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar"><a class="logo" href="index.html">LUMINA INTERACTIVE™</a></nav>

<main class="container">
<div class="checkout-layout">

  <div class="form-card">
    <h2>Dados do cliente</h2>
    <p>Preencha seus dados para continuar para o pagamento.</p>

    <div id="alertArea"></div>

    <div class="field">
      <label>Nome completo</label>
      <input type="text" id="nome" placeholder="Seu nome completo" required>
    </div>

    <div class="field">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="seuemail@gmail.com" required>
    </div>

    <div class="field">
      <label>WhatsApp</label>
      <input type="text" id="whatsapp" placeholder="(00) 00000-0000" required>
    </div>

    <div class="field">
      <label>Método de pagamento</label>
      <select id="pagamento">
        <option value="PIX">PIX</option>
        <option value="PicPay">PicPay</option>
      </select>
    </div>

    <button class="btn primary" onclick="finalizar()" style="width:100%;margin-top:8px">
      Continuar para pagamento
    </button>
  </div>

  <div class="summary-card">
    <span class="badge">RESUMO DO PEDIDO</span>
    <h2 id="nomeProduto">Carregando...</h2>
    <p id="descProduto"></p>
    <div class="price" id="precoProduto">—</div>
    <p style="font-size:14px;color:#64748b">Após confirmar, você será direcionado para o pagamento.</p>
  </div>

</div>
</main>

<footer class="footer">
<div>Lumina Interactive™</div>
<div>Levando o futebol portátil a outro nível.</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://tqsalhscgkepttbczyjq.supabase.co";
const SUPABASE_KEY = "sb_publishable_Q99EhX_HpUVotGGqmWAf4A_pkiTB7bK";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const produtos = {
  "brazukas":    { nome: "Brazukas Patch", preco: 0,    descricao: "O patch brasileiro definitivo." },
  "lpfl-normal": { nome: "LPFL Normal",    preco: 0,    descricao: "Experiência clássica do LPFL." },
  "lpfl-pro":    { nome: "LPFL PRO",       preco: 0,    descricao: "Versão premium do LPFL." },
  "lumina-plus": { nome: "Lumina Plus",    preco: 9.90, descricao: "Acesso premium da Lumina Interactive." }
};

const slug = new URLSearchParams(window.location.search).get("produto") || "lumina-plus";
const produto = produtos[slug] || produtos["lumina-plus"];

document.getElementById("nomeProduto").textContent = produto.nome;
document.getElementById("descProduto").textContent = produto.descricao;
document.getElementById("precoProduto").textContent =
  produto.preco === 0 ? "Grátis" :
  produto.preco.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });

function showAlert(msg, tipo = "error") {
  document.getElementById("alertArea").innerHTML =
    `<div class="alert alert-${tipo}">${msg}</div>`;
}

async function finalizar() {
  const nome = document.getElementById("nome").value.trim();
  const email = document.getElementById("email").value.trim();
  const whatsapp = document.getElementById("whatsapp").value.trim();
  const pagamento = document.getElementById("pagamento").value;

  if (!nome || !email || !whatsapp) {
    showAlert("Preencha todos os campos.");
    return;
  }

  const pedido = {
    nome_cliente: nome,
    email: email,
    whatsapp: whatsapp,
    produto: produto.nome,
    plano: slug,
    valor: Number(produto.preco || 0),
    status: produto.preco === 0 ? "pendente" : "aguardando_pagamento",
    metodo_pagamento: pagamento,
    acesso_liberado: false
  };

  const { data, error } = await client
    .from("pedidos")
    .insert([pedido])
    .select();

  if (error) {
    showAlert("Erro ao registrar pedido: " + error.message);
    return;
  }

  window.location.href = "comprovante.html?pedido_id=" + data[0].id;
}
</script>
<script src="auth.js"></script>
</body>
</html>
