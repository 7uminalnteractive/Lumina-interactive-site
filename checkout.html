<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | Lumina Interactive</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="forms.css">

</head>

<body>

<nav class="navbar">

<div class="logo">
LUMINA INTERACTIVE™
</div>

<div class="menu">

<a href="index.html">Início</a>
<a href="patches.html">Patchs</a>
<a href="plus.html">Lumina Plus</a>
<a href="login.html">Login</a>

</div>

</nav>

<main class="container">

<section>

<div class="form-card" style="max-width:700px;margin:auto;">

<h2>
Checkout
</h2>

<p>
Finalize sua assinatura da Lumina Interactive.
</p>

<form id="checkoutForm">

<div class="form-grid">

<div>

<label>Nome completo</label>

<input
type="text"
id="nome"
required
>

</div>

<div>

<label>E-mail</label>

<input
type="email"
id="email"
required
>

</div>

<div>

<label>WhatsApp</label>

<input
type="text"
id="whatsapp"
required
>

</div>

<div>

<label>Produto</label>

<select id="produto">

<option value="Lumina Plus">
Lumina Plus
</option>

<option value="LPFL PRO">
LPFL PRO
</option>

<option value="Brazukas Patch">
Brazukas Patch
</option>

</select>

</div>

<div class="form-full">

<label>Método de pagamento</label>

<select id="metodo">

<option value="PIX">
PIX
</option>

<option value="PicPay">
PicPay
</option>

</select>

</div>

</div>

<button
class="btn primary"
type="submit"
style="width:100%;margin-top:12px;"
>

Continuar para pagamento

</button>

</form>

</div>

</section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const SUPABASE_URL =
"https://tqsalhscgkepttbczyjq.supabase.co";

const SUPABASE_KEY =
"sb_publishable_Q99EhX_HpUVotGGqmWAf4A_pkiTB7bK";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

document
.getElementById("checkoutForm")
.addEventListener(
"submit",
async (e)=>{

e.preventDefault();

const pedido = {

nome_cliente:
document.getElementById("nome").value,

email:
document.getElementById("email").value,

whatsapp:
document.getElementById("whatsapp").value,

produto:
document.getElementById("produto").value,

metodo_pagamento:
document.getElementById("metodo").value,

status:
"aguardando_pagamento",

valor:9.90,

acesso_liberado:false

};

const { data, error } =
await supabaseClient
.from("pedidos")
.insert([pedido])
.select();

if(error){

alert(error.message);
return;

}

window.location.href =
"comprovante.html?pedido_id=" +
data[0].id;

}
);

</script>

</body>
</html>
