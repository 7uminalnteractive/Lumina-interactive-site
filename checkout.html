<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout • Lumina Interactive</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">
LUMINA INTERACTIVE™
</div>

<div class="nav-right">

<a href="minha-conta.html" class="profile-btn">

<img
src="https://cdn-icons-png.flaticon.com/512/847/847969.png"
class="profile-icon"
>

</a>

<button class="menu-toggle" onclick="toggleMenu()">

<span></span>
<span></span>
<span></span>

</button>

</div>

</nav>

<!-- MENU MOBILE -->

<div class="mobile-menu" id="mobileMenu">

<a href="index.html">Início</a>
<a href="patches.html">Patchs</a>
<a href="downloads.html">Downloads</a>
<a href="plus.html">Lumina Plus</a>

</div>

<!-- CONTEÚDO -->

<main class="container">

<section class="hero">

<p class="tag">
CHECKOUT
</p>

<h1 style="font-size:56px">
Finalize sua assinatura
</h1>

<p class="desc">

Preencha seus dados abaixo para continuar
o pagamento da Lumina Interactive.

</p>

</section>

<section class="checkout-box">

<h2 class="section-title">
Dados do cliente
</h2>

<form
class="checkout-form"
id="checkoutForm"
>

<div>

<label>
Nome completo
</label>

<input
type="text"
id="nome"
placeholder="Seu nome"
required
>

</div>

<div>

<label>
E-mail
</label>

<input
type="email"
id="email"
placeholder="Seu e-mail"
required
>

</div>

<div>

<label>
WhatsApp
</label>

<input
type="text"
id="whatsapp"
placeholder="(75) 99999-9999"
required
>

</div>

<div>

<label>
Produto
</label>

<select id="produto">

<option value="Lumina Plus">
Lumina Plus
</option>

<option value="LPFL PRO">
LPFL PRO
</option>

<option value="Brazukas Patch">
Brazukas Patch
</option>

<option value="LPFL Normal">
LPFL Normal
</option>

</select>

</div>

<div>

<label>
Método de pagamento
</label>

<select id="metodo">

<option value="PIX">
PIX
</option>

<option value="PIC PAY">
PIC PAY
</option>

</select>

</div>

<button
type="submit"
class="btn primary"
style="width:100%;margin-top:15px"
>

Continuar para pagamento

</button>

</form>

</section>

<!-- RESUMO -->

<section class="checkout-resumo">

<span class="badge">
RESUMO
</span>

<h2 id="produtoNome">
Lumina Plus
</h2>

<p class="desc">
Acesso premium da Lumina Interactive.
</p>

<div class="price">
R$ 9,90
</div>

</section>

</main>

<!-- SCRIPT MENU -->

<script>

function toggleMenu() {

const menu =
document.getElementById(
"mobileMenu"
);

menu.classList.toggle(
"active"
);

}

</script>

<!-- SCRIPT CHECKOUT -->

<script>

const produtoInput =
document.getElementById(
"produto"
);

const produtoNome =
document.getElementById(
"produtoNome"
);

produtoInput.addEventListener(
"change",
() => {

produtoNome.innerHTML =
produtoInput.value;

}
);

document
.getElementById(
"checkoutForm"
)
.addEventListener(
"submit",
function(e){

e.preventDefault();

alert(
"Pagamento iniciado!"
);

}
);

</script>

</body>
</html>
