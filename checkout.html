<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | Lumina Interactive</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar">

<div class="logo">
LUMINA INTERACTIVE™
</div>

<div class="menu">

<a href="index.html">
Início
</a>

<a href="patches.html">
Patchs
</a>

<a href="plus.html">
Lumina Plus
</a>

<a href="login.html">
Login
</a>

</div>

</nav>

<main class="container">

<section>

<div class="section-title">

<div>

<h2>
Checkout
</h2>

<p>
Finalize sua assinatura da Lumina Interactive.
</p>

</div>

</div>

<div class="checkout-layout">

<form
class="form-card"
id="checkoutForm"
>

<h2>
Dados do cliente
</h2>

<label>
Nome completo
</label>

<input
type="text"
id="nome"
required
>

<label>
E-mail
</label>

<input
type="email"
id="email"
required
>

<label>
WhatsApp
</label>

<input
type="text"
id="whatsapp"
required
>

<label>
Produto
</label>

<select id="produto">

<option value="Lumina Plus">
Lumina Plus
</option>

<option value="LPFL PRO">
LPFL PRO
</option>

<option value="Brazukas Patch">
Brazukas Patch
</option>

</select>

<label>
Método de pagamento
</label>

<select id="metodo">

<option value="PIX">
PIX
</option>

<option value="PicPay">
PicPay
</option>

</select>

<button
type="submit"
class="btn primary"
>

Continuar para pagamento

</button>

</form>

<div class="summary-card">

<span class="badge">
RESUMO
</span>

<h2>
Lumina Plus
</h2>

<p>
Acesso premium da Lumina Interactive.
</p>

<div class="price">
R$ 9,90
</div>

<p style="
margin-top:20px;
color:var(--muted);
">

Após continuar, você será levado
para a tela de pagamento Pix.

</p>

</div>

</div>

</section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const SUPABASE_URL =
"https://tqsalhscgkepttbczyjq.supabase.co";

const SUPABASE_KEY =
"sb_publishable_Q99EhX_HpUVotGGqmWAf4A_pkiTB7bK";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

document.getElementById(
"checkoutForm"
).addEventListener(
"submit",
async (e)=>{

e.preventDefault();

const pedido = {

nome_cliente:
document.getElementById(
"nome"
).value,

email:
document.getElementById(
"email"
).value,

whatsapp:
document.getElementById(
"whatsapp"
).value,

produto:
document.getElementById(
"produto"
).value,

metodo_pagamento:
document.getElementById(
"metodo"
).value,

status:"aguardando_pagamento",

valor:9.90,

acesso_liberado:false

};

const {
data,
error
}
=
await supabaseClient
.from("pedidos")
.insert([pedido])
.select();

if(error){

alert(error.message);
return;

}

const pedidoId =
data[0].id;

window.location.href =
"comprovante.html?pedido_id=" +
pedidoId;

});

</script>

</body>
</html>
