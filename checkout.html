<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout • Lumina Interactive</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">
LUMINA INTERACTIVE™
</div>

<div class="nav-right">

<a href="minha-conta.html" class="profile-btn">

<img
src="https://cdn-icons-png.flaticon.com/512/847/847969.png"
class="profile-icon"
alt="Perfil"
>

</a>

<button class="menu-toggle" onclick="toggleMenu()">

<span></span>
<span></span>
<span></span>

</button>

</div>

</nav>

<!-- MENU MOBILE -->

<div class="mobile-menu" id="mobileMenu">

<a href="index.html">Início</a>
<a href="patches.html">Patchs</a>
<a href="downloads.html">Downloads</a>
<a href="plus.html">Lumina Plus</a>

</div>

<!-- CONTEÚDO -->

<main class="container">

<section class="hero">

<div>

<p class="tag">
CHECKOUT
</p>

<h1>
Checkout
</h1>

<p class="desc">

Finalize sua assinatura da Lumina Interactive.

</p>

</div>

</section>

<!-- DADOS -->

<section class="checkout-box">

<h2 style="
font-size:52px;
margin-bottom:30px;
">
Dados do cliente
</h2>

<form
class="checkout-form"
id="checkoutForm"
>

<div>

<label>
Nome completo
</label>

<input
type="text"
id="nome"
placeholder="Digite seu nome"
required
>

</div>

<div>

<label>
E-mail
</label>

<input
type="email"
id="email"
placeholder="Digite seu e-mail"
required
>

</div>

<div>

<label>
WhatsApp
</label>

<input
type="text"
id="whatsapp"
placeholder="(75) 99999-9999"
required
>

</div>

<div>

<label>
Produto
</label>

<select id="produto">

<option value="Lumina Plus">
Lumina Plus
</option>

<option value="LPFL PRO">
LPFL PRO
</option>

<option value="Brazukas Patch">
Brazukas Patch
</option>

<option value="LPFL Normal">
LPFL Normal
</option>

</select>

</div>

<div>

<label>
Método de pagamento
</label>

<select id="metodo">

<option value="PIX">
PIX
</option>

<option value="PIC PAY">
PIC PAY
</option>

</select>

</div>

<button
type="submit"
class="btn primary"
style="
width:100%;
margin-top:15px;
font-size:20px;
padding:20px;
"
>

Continuar para pagamento

</button>

</form>

</section>

<!-- RESUMO -->

<section class="checkout-resumo">

<span class="badge">
RESUMO
</span>

<h2
id="produtoNome"
style="
font-size:56px;
margin-top:20px;
"
>

Lumina Plus

</h2>

<p class="desc">

Acesso premium da Lumina Interactive.

</p>

<div
class="price"
style="
font-size:70px;
font-weight:900;
margin-top:20px;
"
>

R$ 9,90

</div>

</section>

</main>

<!-- FOOTER -->

<footer class="footer">

<div>
Lumina Interactive™
</div>

<div>
Levando o futebol portátil a outro nível.
</div>

</footer>

<!-- MENU SCRIPT -->

<script>

function toggleMenu() {

const menu =
document.getElementById(
"mobileMenu"
);

menu.classList.toggle(
"active"
);

}

</script>

<!-- CHECKOUT SCRIPT -->

<script>

const produtoInput =
document.getElementById(
"produto"
);

const produtoNome =
document.getElementById(
"produtoNome"
);

produtoInput.addEventListener(
"change",
() => {

produtoNome.innerHTML =
produtoInput.value;

}
);

document
.getElementById(
"checkoutForm"
)
.addEventListener(
"submit",
function(e){

e.preventDefault();

alert(
"Pagamento iniciado!"
);

}
);

</script>

</body>
</html>
