<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comprovante</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar">

<div class="logo">
LUMINA INTERACTIVE™
</div>

</nav>

<main class="container">

<section>

<div class="checkout-layout">

<form
class="form-card"
id="formComprovante"
>

<h2>
Enviar comprovante
</h2>

<label>
Nome
</label>

<input
type="text"
id="nome"
required
>

<label>
E-mail
</label>

<input
type="email"
id="email"
required
>

<label>
WhatsApp
</label>

<input
type="text"
id="whatsapp"
required
>

<label>
Produto
</label>

<select id="produto">

<option>
Lumina Plus
</option>

<option>
LPFL PRO
</option>

<option>
Brazukas Patch
</option>

</select>

<label>
Anexar comprovante
</label>

<input
type="file"
id="arquivo"
accept="image/*"
required
>

<button
class="btn primary"
type="submit"
>

Enviar comprovante

</button>

</form>

<div class="summary-card">

<span class="badge">
PIX / PICPAY
</span>

<h2>
Pagamento via Pix
</h2>

<img
src="1005625839.jpg"
style="
width:100%;
max-width:320px;
margin:auto;
display:block;
border-radius:24px;
background:white;
padding:15px;
"
>

<div style="
margin-top:20px;
padding:18px;
border-radius:18px;
background:#070b1c;
word-break:break-all;
">

<span id="pixCode">

00020126740014br.gov.bcb.pix0111099248645900237Cofrinho de Luan Vinicius Da Silva Me5204000053039865802BR5925Luan Vinicius Da Silva Me6015Feira de Santan61084409220062270523COFRNDgzNzA5NDAxMDAwMDQ6304CC1B

</span>

</div>

<button
class="btn primary"
style="margin-top:15px;"
onclick="copiarPix()"
>

Copiar Pix

</button>

</div>

</div>

</section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const SUPABASE_URL =
"https://tqsalhscgkepttbczyjq.supabase.co";

const SUPABASE_KEY =
"sb_publishable_Q99EhX_HpUVotGGqmWAf4A_pkiTB7bK";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

function copiarPix(){

const texto =
document.getElementById(
"pixCode"
).innerText;

navigator.clipboard.writeText(
texto
);

alert(
"Pix copiado!"
);

}

const form =
document.getElementById(
"formComprovante"
);

form.addEventListener(
"submit",
async (e)=>{

e.preventDefault();

const comprovante = {

nome_cliente:
document.getElementById(
"nome"
).value,

email:
document.getElementById(
"email"
).value,

whatsapp:
document.getElementById(
"whatsapp"
).value,

produto:
document.getElementById(
"produto"
).value,

status:
"aguardando"

};

const { error } =
await supabaseClient
.from("pedidos")
.insert([comprovante]);

if(error){

alert(error.message);
return;

}

alert(
"Comprovante enviado!"
);

window.location.href =
"minha-conta.html";

});

</script>

</body>
</html>
