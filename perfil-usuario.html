<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil do Usuário | Admin</title>
<link rel="stylesheet" href="style.css">
<style>
.info-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 0; border-bottom: 1px solid var(--border);
  font-size: 14px; gap: 12px;
}
.info-row:last-child { border-bottom: none; }
.info-label { color: var(--muted); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; }
.info-value { color: var(--text); font-weight: 500; text-align: right; word-break: break-all; }
.info-block {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 18px; padding: 24px 28px; margin-bottom: 20px;
}
.info-block-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 18px;
  letter-spacing: 1px; color: var(--muted);
  margin-bottom: 16px; text-transform: uppercase;
}
</style>
</head>
<body>

<div id="semAcesso" style="position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px">
  <div style="font-size:14px;color:var(--muted)">Acesso restrito ao administrador.</div>
  <a href="admin.html" class="btn primary">Ir para o Admin</a>
</div>

<div id="painelPerfil" style="display:none">
<nav class="navbar">
  <div class="logo"><img src="logo.png" alt="Lumina Interactive" style="height:36px;width:auto;display:block"></div>
  <div style="display:flex;align-items:center;gap:12px;margin-left:auto">
    <a href="admin.html" class="btn secondary" style="padding:8px 14px;font-size:12px">← Voltar ao Admin</a>
  </div>
</nav>

<div class="page-wrap" style="min-height:100vh;padding:100px 20px 60px">
  <div style="max-width:640px;margin:0 auto">

    <!-- Header do perfil -->
    <div style="display:flex;align-items:center;gap:20px;margin-bottom:32px">
      <div style="width:64px;height:64px;background:var(--blue-dim);border:1px solid rgba(26,107,255,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="#6aabff"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
      </div>
      <div>
        <div id="headerNome" style="font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;line-height:1">—</div>
        <div id="headerId" style="color:var(--blue);font-size:14px;font-weight:700;margin-top:4px">—</div>
      </div>
    </div>

    <!-- Dados pessoais -->
    <div class="info-block">
      <div class="info-block-title">Dados pessoais</div>
      <div class="info-row"><span class="info-label">Nome</span><span class="info-value" id="uNome">—</span></div>
      <div class="info-row"><span class="info-label">@ID Online</span><span class="info-value" id="uId" style="color:var(--blue);font-weight:700">—</span></div>
      <div class="info-row">
        <span class="info-label">E-mail</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="info-value" id="uEmail" style="color:#6aabff;font-family:monospace;font-size:13px">—</span>
          <button onclick="copiar('uEmail','email')" style="background:var(--blue-dim);border:1px solid rgba(26,107,255,0.25);color:#6aabff;border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:var(--font-body);white-space:nowrap" id="btnCopyEmail">Copiar</button>
        </div>
      </div>
      <div class="info-row">
        <span class="info-label">Telefone</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="info-value" id="uTelefone">—</span>
          <button onclick="copiar('uTelefone','telefone')" style="background:var(--blue-dim);border:1px solid rgba(26,107,255,0.25);color:#6aabff;border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:var(--font-body);white-space:nowrap" id="btnCopyTel">Copiar</button>
        </div>
      </div>
      <div class="info-row"><span class="info-label">Cadastro</span><span class="info-value" id="uCriado">—</span></div>
      <div class="info-row">
        <span class="info-label">Senha</span>
        <span class="info-value" style="color:var(--muted);font-size:12px;font-style:italic">Criptografada — não visível por segurança</span>
      </div>
    </div>

    <!-- Assinaturas -->
    <div class="info-block">
      <div class="info-block-title">Assinaturas</div>
      <div id="uAssinaturas"><div style="color:var(--muted);font-size:14px;text-align:center;padding:20px 0">Carregando...</div></div>
    </div>

    <!-- Pedidos -->
    <div class="info-block">
      <div class="info-block-title">Histórico de pedidos</div>
      <div id="uPedidos" style="overflow-x:auto">
        <div style="color:var(--muted);font-size:14px;text-align:center;padding:20px 0">Carregando...</div>
      </div>
    </div>

    <!-- Ações rápidas -->
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px" id="acoesRapidas"></div>

  </div>
</div>

<footer class="footer">
  <div class="footer-logo"><img src="logo.png" alt="Lumina Interactive" style="height:32px;width:auto;opacity:0.85"></div>
  <div class="footer-copy">© 2026 Lumina Interactive™.</div>
</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="app.js"></script>
<script>
// Verifica se é admin
if (sessionStorage.getItem("lumina_admin") !== "ok" && localStorage.getItem("lumina_admin") !== "ok") {
  document.getElementById("semAcesso").style.display = "flex";
} else {
  document.getElementById("painelPerfil").style.display = "block";
  carregarPerfil();
}

async function carregarPerfil() {
  const params = new URLSearchParams(window.location.search);
  const email = params.get("email");
  if (!email) { document.getElementById("uNome").textContent = "Usuário não encontrado."; return; }

  // Busca perfil
  const { data: perfil } = await supabaseClient.from("perfis").select("*").eq("email", email).maybeSingle();

  // Busca pedidos
  const { data: pedidos } = await supabaseClient.from("pedidos").select("*").eq("email", email).order("id", { ascending: false });

  // Preenche dados pessoais
  const nome = perfil?.nome || email;
  document.getElementById("headerNome").textContent = nome;
  document.getElementById("headerId").textContent   = perfil?.id_online ? "@" + perfil.id_online : "Sem @ID";
  document.getElementById("uNome").textContent      = nome;
  document.getElementById("uId").textContent        = perfil?.id_online ? "@" + perfil.id_online : "—";
  document.getElementById("uEmail").textContent     = email;
  document.getElementById("uTelefone").textContent  = perfil?.telefone || "—";
  document.getElementById("uCriado").textContent    = perfil?.criado_em
    ? new Date(perfil.criado_em).toLocaleDateString("pt-BR") + " às " + new Date(perfil.criado_em).toLocaleTimeString("pt-BR", {hour:"2-digit",minute:"2-digit"})
    : "—";

  // Assinaturas ativas
  const agora = new Date();
  const ativas = (pedidos||[]).filter(p => p.status==="aprovado" && (!p.validade_ate||new Date(p.validade_ate)>agora));
  const assinDiv = document.getElementById("uAssinaturas");
  if (!ativas.length) {
    assinDiv.innerHTML = `<div style="color:var(--muted);font-size:14px;text-align:center;padding:20px 0">Nenhuma assinatura ativa.</div>`;
  } else {
    assinDiv.innerHTML = ativas.map(p => {
      const val = p.validade_ate ? new Date(p.validade_ate) : null;
      const dias = val ? Math.ceil((val-agora)/(1000*60*60*24)) : "∞";
      const cor = typeof dias==="number"&&dias<=7?"#fbbf24":"#22c55e";
      return `<div class="info-row">
        <div>
          <div style="font-weight:600;font-size:14px">${p.produto||"Lumina Plus"}</div>
          <div style="font-size:12px;color:var(--muted)">Válido até ${val?val.toLocaleDateString("pt-BR"):"—"}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:${cor}">${dias}d</span>
          <span class="status-badge status-aprovado">Ativa</span>
        </div>
      </div>`;
    }).join("");
  }

  // Histórico de pedidos
  const pedDiv = document.getElementById("uPedidos");
  if (!pedidos||!pedidos.length) {
    pedDiv.innerHTML = `<div style="color:var(--muted);font-size:14px;text-align:center;padding:20px 0">Nenhum pedido encontrado.</div>`;
  } else {
    pedDiv.innerHTML = `<table style="width:100%">
      <thead><tr><th>ID</th><th>Produto</th><th>Valor</th><th>Status</th><th>Data</th></tr></thead>
      <tbody>${pedidos.map(p => {
        let sc = p.status==="aprovado"?"status-aprovado":p.status==="cancelado"?"status-cancelado":"status-pendente";
        return `<tr>
          <td style="font-family:monospace;font-size:12px;color:#6aabff">#${p.id}</td>
          <td style="font-size:13px">${p.produto||"—"}</td>
          <td style="font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--blue)">${Number(p.valor||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}</td>
          <td><span class="status-badge ${sc}">${p.status||"—"}</span></td>
          <td style="font-size:12px;color:var(--muted)">${p.aprovado_em?new Date(p.aprovado_em).toLocaleDateString("pt-BR"):"—"}</td>
        </tr>`;
      }).join("")}</tbody>
    </table>`;
  }

  // Ações rápidas (pega o último pedido aprovado)
  const ultimoPedido = (pedidos||[]).find(p => p.status==="aprovado");
  const acoesDiv = document.getElementById("acoesRapidas");
  if (ultimoPedido) {
    acoesDiv.innerHTML = `
      <button class="btn-action btn-approve" onclick="aprovarPedido(${ultimoPedido.id})" style="padding:10px 16px;border-radius:12px;font-size:13px">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>Renovar 30d
      </button>
      <button class="btn-action btn-cancel" onclick="cancelarPedido(${ultimoPedido.id})" style="padding:10px 16px;border-radius:12px;font-size:13px">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>Cancelar assinatura
      </button>`;
  }
}


function copiar(elementId, tipo) {
  const texto = document.getElementById(elementId).textContent.trim();
  if (!texto || texto === "—") return;
  navigator.clipboard.writeText(texto).then(() => {
    const btn = document.getElementById("btnCopy" + (tipo === "email" ? "Email" : "Tel"));
    const original = btn.textContent;
    btn.textContent = "Copiado!";
    btn.style.background = "rgba(34,197,94,0.15)";
    btn.style.borderColor = "rgba(34,197,94,0.3)";
    btn.style.color = "#22c55e";
    setTimeout(() => {
      btn.textContent = original;
      btn.style.background = "";
      btn.style.borderColor = "";
      btn.style.color = "";
    }, 2000);
  });
}

async function aprovarPedido(id) {
  const agora=new Date(),v=new Date(agora); v.setDate(v.getDate()+30);
  await supabaseClient.from("pedidos").update({status:"aprovado",aprovado_em:agora.toISOString(),validade_ate:v.toISOString()}).eq("id",id);
  location.reload();
}
async function cancelarPedido(id) {
  if (!confirm("Cancelar assinatura?")) return;
  await supabaseClient.from("pedidos").update({status:"cancelado"}).eq("id",id);
  location.reload();
}
</script>
</body>
</html>
