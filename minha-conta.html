<body>

<div class="page-wrap" style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
  <div class="account-card" style="opacity:1;transform:none">
    <div class="badge">Conta</div>
    <h1>Minha conta</h1>
    <p>Gerencie sua assinatura e downloads.</p>
    <div class="account-email" id="emailUsuario">Carregando...</div>
    <button onclick="logout()" class="btn primary" style="width:100%">Sair da conta</button>
  </div>

<footer class="footer">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const supabaseClient = supabase.createClient(
  "https://tqsalhscgkepttbczyjq.supabase.co",
  "sb_publishable_Q99EhX_HpUVotGGqmWAf4A_pkiTB7bK"
);

async function init() {
  // Tenta pegar sessão ativa do Supabase (funciona com Google OAuth também)
  const { data: { session } } = await supabaseClient.auth.getSession();

  if (session && session.user) {
    const email = session.user.email;
    localStorage.setItem("lumina_logado", "sim");
    localStorage.setItem("lumina_email", email);
    document.getElementById("emailUsuario").innerText = email;
    return;
  }

  // Fallback: localStorage (login por senha já salvo)
  const email = localStorage.getItem("lumina_email");
  if (email) {
    document.getElementById("emailUsuario").innerText = email;
    return;
  }

  // Não logado
  window.location.href = "login.html";
}

async function logout() {
  await supabaseClient.auth.signOut();
  localStorage.removeItem("lumina_logado");
  localStorage.removeItem("lumina_email");
  window.location.href = "login.html";
}

init();
</script>
<script src="navbar-auth.js"></script>
</body>
</html>
