<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Conta | Lumina Interactive</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
<div class="logo">LUMINA INTERACTIVE™</div>
<div class="menu">
<a href="index.html">Início</a>
<a href="patches.html">Patchs</a>
<a href="downloads.html">Downloads</a>
<a href="plus.html">Lumina Plus</a>
<a href="minha-conta.html">Minha conta</a>
</div>
</nav>

<main class="container account-section">
<div id="loadingMsg" class="loading">Carregando sua conta...</div>
<div id="accountArea" style="display:none">

  <div class="page-header">
    <h1>Minha conta</h1>
    <p>Gerencie seus dados e assinaturas da Lumina Interactive.</p>
  </div>

  <div class="account-card" style="margin-top:30px">
    <h2>Dados da conta</h2>
    <div class="account-info">
      <p><strong>E-mail:</strong> <span id="emailUsuario">—</span></p>
    </div>
    <button onclick="logout()" class="btn danger" style="font-size:16px;padding:14px 28px">
      Sair da conta
    </button>
  </div>

  <div style="margin-top:40px">
    <h2 style="font-size:28px;margin-bottom:20px">Meus pedidos</h2>
    <div id="pedidosUsuario" class="cards">
      <div class="loading">Buscando pedidos...</div>
    </div>
  </div>

</div>
</main>

<footer class="footer">
<div>Lumina Interactive™</div>
<div>Levando o futebol portátil a outro nível.</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://tqsalhscgkepttbczyjq.supabase.co";
const SUPABASE_KEY = "sb_publishable_Q99EhX_HpUVotGGqmWAf4A_pkiTB7bK";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function init() {
  const { data: { user }, error } = await client.auth.getUser();

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  document.getElementById("loadingMsg").style.display = "none";
  document.getElementById("accountArea").style.display = "block";
  document.getElementById("emailUsuario").textContent = user.email;

  carregarPedidos(user.email);
}

async function carregarPedidos(email) {
  const area = document.getElementById("pedidosUsuario");
  const { data, error } = await client
    .from("pedidos")
    .select("*")
    .eq("email", email)
    .order("id", { ascending: false });

  if (error || !data || data.length === 0) {
    area.innerHTML = "<div class='card'><p>Nenhum pedido encontrado.</p></div>";
    return;
  }

  const statusLabel = {
    pendente: "⏳ Pendente",
    aguardando_pagamento: "💳 Aguardando pagamento",
    ativa: "✅ Ativo",
    recusada: "❌ Recusado",
    cancelada: "🚫 Cancelado"
  };

  area.innerHTML = data.map(p => `
    <div class="card">
      <span class="badge">${statusLabel[p.status] || p.status}</span>
      <h3>${p.produto || "Produto"}</h3>
      <p><strong>Valor:</strong> R$ ${Number(p.valor || 0).toFixed(2)}</p>
      <p><strong>Método:</strong> ${p.metodo_pagamento || "—"}</p>
      ${p.acesso_liberado && p.download_url
        ? `<a href="${p.download_url}" target="_blank" class="btn primary" style="font-size:16px;padding:14px 24px;margin-top:12px">
            Baixar agora
           </a>`
        : p.status === "pendente" || p.status === "aguardando_pagamento"
          ? `<p style="color:#f59e0b;margin-top:12px">Aguardando confirmação de pagamento.</p>`
          : ""
      }
    </div>
  `).join("");
}

async function logout() {
  await client.auth.signOut();
  window.location.href = "login.html";
}

init();
</script>
</body>
</html>
