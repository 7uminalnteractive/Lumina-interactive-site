<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Conta | Lumina Interactive</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar">
  <div class="logo">LUMINA <span>INTERACTIVE</span>™</div>
  <div class="menu">
    <a href="index.html">Início</a><a href="patches.html">Patchs</a>
    <a href="downloads.html">Downloads</a><a href="plus.html">Lumina Plus</a>
    <a href="minha-conta.html" class="active">Minha conta</a>
  </div>
</nav>
<div class="page-wrap" style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
  <div class="account-card reveal">
    <div class="badge">Conta</div>
    <h1>Minha conta</h1>
    <p>Gerencie sua assinatura e downloads.</p>
    <div class="account-email" id="emailUsuario">Carregando...</div>
    <button onclick="logout()" class="btn primary" style="width:100%">Sair da conta</button>
  </div>
</div>
<footer class="footer">
  <div class="footer-logo">LUMINA <span>INTERACTIVE</span>™</div>
  <div class="footer-links">
    <a href="index.html">Início</a><a href="patches.html">Patchs</a>
    <a href="downloads.html">Downloads</a><a href="plus.html">Lumina Plus</a>
  </div>
  <div class="footer-copy">© 2026 Lumina Interactive™. Todos os direitos reservados.</div>
</footer>
<script>
const email=localStorage.getItem("lumina_email");
if(email){document.getElementById("emailUsuario").innerText=email;}
else{window.location.href="login.html";}
function logout(){localStorage.removeItem("lumina_logado");localStorage.removeItem("lumina_email");window.location.href="login.html";}
</script>
<script src="navbar-auth.js"></script>
<script>
const revealEls=document.querySelectorAll('.reveal');
const obs=new IntersectionObserver((e)=>{e.forEach((x,i)=>{if(x.isIntersecting){setTimeout(()=>x.target.classList.add('visible'),i*80);obs.unobserve(x.target);}});},{threshold:0.1});
revealEls.forEach(el=>obs.observe(el));
</script>
</body>
</html>
