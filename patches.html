<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patchs | Lumina Interactive</title>
<link rel="stylesheet" href="style.css">
<style>
.dl-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 24px;
  margin-top: 8px;
}
.dl-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 24px;
  overflow: hidden;
  transition: border-color .2s, transform .2s, box-shadow .2s;
}
.dl-card:hover { transform: translateY(-4px); box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
.dl-card.featured { border-color: rgba(26,107,255,0.35); box-shadow: 0 0 40px rgba(26,107,255,0.1); }
.dl-card.pro      { border-color: rgba(167,139,250,0.35); box-shadow: 0 0 40px rgba(167,139,250,0.08); }

.dl-cover { position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden; background: var(--bg3); }
.dl-cover img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .4s; }
.dl-card:hover .dl-cover img { transform: scale(1.04); }
.dl-cover-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--bg3), #0a1020);
  font-family: var(--font-hero); font-size: 48px; letter-spacing: 2px; color: rgba(255,255,255,0.1);
}
.dl-cover-badge {
  position: absolute; top: 12px; left: 12px;
  background: rgba(4,7,15,0.75); backdrop-filter: blur(8px);
  border: 1px solid var(--border); border-radius: 999px;
  padding: 4px 12px; font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: #94a3b8;
}
.dl-cover-badge.blue   { background: rgba(26,107,255,0.25);  border-color: rgba(26,107,255,0.4);  color: #6aabff; }
.dl-cover-badge.purple { background: rgba(167,139,250,0.25); border-color: rgba(167,139,250,0.4); color: #c4b5fd; }
.dl-cover-badge.green  { background: rgba(34,197,94,0.2);    border-color: rgba(34,197,94,0.4);   color: #86efac; }

.dl-lock-overlay {
  position: absolute; inset: 0;
  background: rgba(4,7,15,0.65); backdrop-filter: blur(2px);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
}
.dl-lock-icon { width: 48px; height: 48px; background: rgba(167,139,250,0.2); border: 1px solid rgba(167,139,250,0.35); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.dl-lock-text { font-size: 12px; font-weight: 700; color: #c4b5fd; letter-spacing: 1px; }

.dl-body { padding: 22px 24px 24px; }
.dl-title { font-family: var(--font-hero); font-size: 28px; letter-spacing: 1px; line-height: 1; margin-bottom: 8px; }
.dl-version { font-size: 12px; color: var(--muted); margin-bottom: 14px; }

.dl-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.dl-tag { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 999px; padding: 3px 10px; font-size: 11px; color: #94a3b8; font-weight: 600; }

.dl-changelog { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; margin-bottom: 18px; }
.dl-changelog-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.dl-changelog ul { list-style: none; margin: 0; padding: 0; }
.dl-changelog ul li { font-size: 12px; color: #94a3b8; padding: 4px 0; display: flex; align-items: flex-start; gap: 8px; border-bottom: 1px solid var(--border); }
.dl-changelog ul li:last-child { border-bottom: none; }
.dl-changelog ul li::before { content: ''; flex-shrink: 0; width: 5px; height: 5px; background: var(--blue); border-radius: 50%; margin-top: 5px; }

.dl-btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
.dl-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 18px; border-radius: 12px; border: none; font-family: var(--font-body); font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none; transition: all .15s; flex: 1; justify-content: center; white-space: nowrap; }
.dl-btn-primary { background: var(--blue); color: #fff; box-shadow: 0 0 20px rgba(26,107,255,0.3); }
.dl-btn-primary:hover { background: #1558d6; transform: translateY(-1px); }
.dl-btn-secondary { background: var(--bg3); border: 1px solid var(--border); color: var(--text); }
.dl-btn-secondary:hover { border-color: rgba(26,107,255,.4); color: #6aabff; }

.dl-requisitos { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
.dl-req-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; display: flex; align-items: center; gap: 8px; }
.dl-req-icon { font-size: 14px; flex-shrink: 0; }
.dl-req-label { font-size: 10px; color: var(--muted); }
.dl-req-valor { font-size: 12px; font-weight: 600; }

.dl-locked-msg { background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.25); border-radius: 12px; padding: 16px 18px; display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
.dl-locked-msg p { font-size: 13px; color: #c4b5fd; line-height: 1.5; }
</style>
</head>
<body>

<nav class="navbar">
  <div class="logo"><img src="logo.png" alt="Lumina Interactive" style="height:36px;width:auto;display:block"></div>
  <div class="menu">
    <a href="index.html">Início</a>
    <a href="patches.html" class="active">Patchs</a>
    <a href="plus.html">Lumina Plus</a>
    <a href="login.html" data-auth-link>Login</a>
  </div>
</nav>

<div class="page-wrap">
  <div class="page-hero container">
    <div class="page-hero-label">Biblioteca</div>
    <h1>Patchs Oficiais</h1>
    <p>Patchs gratuitos e conteúdo exclusivo para assinantes Lumina Plus.</p>
  </div>

  <div class="section" style="padding-top:0;padding-bottom:80px">
    <div id="dl-loading" style="text-align:center;padding:60px;color:var(--muted);font-size:14px">
      <div style="font-family:var(--font-hero);font-size:32px;margin-bottom:12px;color:var(--blue)">⬇</div>
      Carregando...
    </div>
    <div class="dl-grid" id="dl-grid" style="display:none"></div>
  </div>
</div>

<footer class="footer">
  <div class="footer-logo"><img src="logo.png" alt="Lumina Interactive" style="height:32px;width:auto;opacity:0.85"></div>
  <div class="footer-links">
    <a href="index.html">Início</a>
    <a href="patches.html">Patchs</a>
    <a href="plus.html">Lumina Plus</a>
    <a href="login.html" data-auth-link>Login</a>
  </div>
  <div class="footer-copy">© 2026 Lumina Interactive™. Todos os direitos reservados.</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="app.js"></script>
<script>
const PRODUTOS_META = {
  "brazukas": {
    titulo: "Brazukas Patch", subtitulo: "Patch Brasileiro",
    badge: { texto: "Grátis", classe: "green" },
    featured: false, cover: null,
    tags: ["PPSSPP", "Android", "Grátis", "Temporada 2026"],
    changelog: [
      "Times brasileiros da Série A e B atualizados",
      "Uniformes 2026 completos",
      "Escalações e contratações da temporada",
      "Novos rostos de jogadores",
    ],
    requisitos: [
      { icon: "📱", label: "Sistema", valor: "Android 8+" },
      { icon: "💾", label: "Tamanho", valor: "~2.5 GB" },
      { icon: "🎮", label: "Emulador", valor: "PPSSPP" },
      { icon: "🆓", label: "Acesso", valor: "Gratuito" },
    ],
    premium: false, slug: "brazukas",
  },
  "lpfl-normal": {
    titulo: "LPFL Normal", subtitulo: "Versão Clássica",
    badge: { texto: "Destaque", classe: "blue" },
    featured: true, cover: null,
    tags: ["PPSSPP", "Sul-Americano", "Grátis", "Modo Carreira"],
    changelog: [
      "PES Sul-Americano completo",
      "Menu inovador no Modo Carreira",
      "Escalações atualizadas temporada 26",
      "Melhorias de performance e estabilidade",
    ],
    requisitos: [
      { icon: "📱", label: "Sistema", valor: "Android 8+" },
      { icon: "💾", label: "Tamanho", valor: "~3 GB" },
      { icon: "🎮", label: "Emulador", valor: "PPSSPP" },
      { icon: "🆓", label: "Acesso", valor: "Gratuito" },
    ],
    premium: false, slug: "lpfl-normal",
  },
  "lpfl-pro": {
    titulo: "LPFL PRO", subtitulo: "Versão Premium",
    badge: { texto: "Premium", classe: "purple" },
    featured: false, cover: "lpfl-pro-cover.png",
    tags: ["PPSSPP", "Exclusivo Plus", "Semanal", "HD"],
    changelog: [
      "Tudo do LPFL Normal incluído",
      "Packs de Placares, Câmeras e Narrações",
      "Rostos HD de jogadores exclusivos",
      "Atualizações semanais para assinantes",
    ],
    requisitos: [
      { icon: "📱", label: "Sistema", valor: "Android 8+" },
      { icon: "💾", label: "Tamanho", valor: "~4 GB" },
      { icon: "🎮", label: "Emulador", valor: "PPSSPP" },
      { icon: "🔒", label: "Acesso", valor: "Lumina Plus" },
    ],
    premium: true, slug: "lpfl-pro",
  },
};

async function carregarDownloads() {
  const loading = document.getElementById("dl-loading");
  const grid    = document.getElementById("dl-grid");

  const email  = localStorage.getItem("lumina_email");
  const logado = localStorage.getItem("lumina_logado") === "sim";
  let isPlus   = false;

  if (logado && email) {
    const agora = new Date();
    const { data: pedidos } = await supabaseClient
      .from("pedidos")
      .select("status,acesso_liberado,data_fim,download_url")
      .eq("email", email);
    if (pedidos) {
      isPlus = pedidos.some(p =>
        (p.status==="ativa"||p.status==="aprovado") &&
        p.acesso_liberado &&
        (!p.data_fim || new Date(p.data_fim) > agora)
      );
    }
  }

  // Busca links de download do Supabase
  const { data: dlData } = await supabaseClient
    .from("downloads_padrao")
    .select("produto, download_url")
    .eq("ativo", true);

  const dlMap = {};
  if (dlData) dlData.forEach(d => { dlMap[d.produto] = d.download_url; });

  // Se for Plus, também busca o download_url do pedido ativo
  let dlUrlPro = null;
  if (isPlus && email) {
    const agora = new Date();
    const { data: pedAtivo } = await supabaseClient
      .from("pedidos")
      .select("download_url")
      .eq("email", email)
      .eq("acesso_liberado", true)
      .gt("data_fim", agora.toISOString())
      .order("id", { ascending: false })
      .limit(1)
      .maybeSingle();
    dlUrlPro = pedAtivo?.download_url || dlMap["LPFL PRO"] || null;
  }

  const slugs = ["brazukas", "lpfl-normal", "lpfl-pro"];
  grid.innerHTML = slugs.map(slug => {
    const m = PRODUTOS_META[slug];
    if (!m) return "";

    const bloqueado = m.premium && !isPlus;

    const coverHTML = m.cover
      ? `<img src="${m.cover}" alt="${m.titulo}" loading="lazy">`
      : `<div class="dl-cover-placeholder">${m.titulo.split(" ")[0].toUpperCase()}</div>`;

    const lockHTML = bloqueado
      ? `<div class="dl-lock-overlay">
           <div class="dl-lock-icon">
             <svg width="20" height="20" viewBox="0 0 24 24" fill="#c4b5fd"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
           </div>
           <div class="dl-lock-text">Exclusivo Lumina Plus</div>
         </div>`
      : "";

    const tagsHTML      = m.tags.map(t => `<span class="dl-tag">${t}</span>`).join("");
    const changelogHTML = `<div class="dl-changelog"><div class="dl-changelog-label">Novidades desta versão</div><ul>${m.changelog.map(c=>`<li>${c}</li>`).join("")}</ul></div>`;
    const reqHTML       = `<div class="dl-requisitos">${m.requisitos.map(r=>`<div class="dl-req-item"><div class="dl-req-icon">${r.icon}</div><div><div class="dl-req-label">${r.label}</div><div class="dl-req-valor">${r.valor}</div></div></div>`).join("")}</div>`;

    const lockedMsgHTML = bloqueado
      ? `<div class="dl-locked-msg">
           <svg width="18" height="18" viewBox="0 0 24 24" fill="#c4b5fd" style="flex-shrink:0"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
           <p>Este conteúdo é exclusivo para assinantes <strong>Lumina Plus</strong>. Assine para ter acesso.</p>
         </div>`
      : "";

    // ── BOTÕES ──
    let botoesHTML = "";
    if (bloqueado) {
      // Não é assinante — pede para assinar
      botoesHTML = `
        <div class="dl-btn-group">
          <a href="checkout.html?produto=lumina-plus" class="dl-btn dl-btn-primary" style="background:linear-gradient(135deg,#7c3aed,#6d28d9)">✨ Assinar Lumina Plus</a>
          <a href="${m.slug}.html" class="dl-btn dl-btn-secondary">Saiba mais</a>
        </div>`;
    } else if (m.premium) {
      // É assinante Plus — mostra download PRO se disponível
      const url = dlUrlPro;
      if (url) {
        botoesHTML = `
          <div class="dl-btn-group">
            <a href="${url}" class="dl-btn dl-btn-primary" target="_blank" rel="noopener">⬇ Download</a>
            <a href="${m.slug}.html" class="dl-btn dl-btn-secondary">Saiba mais</a>
          </div>`;
      } else {
        botoesHTML = `
          <div class="dl-btn-group">
            <a href="${m.slug}.html" class="dl-btn dl-btn-primary">Ver página do patch</a>
          </div>
          <div style="font-size:11px;color:var(--muted);margin-top:8px;text-align:center">Link de download disponível em breve</div>`;
      }
    } else {
      // Gratuito
      const url = dlMap[m.titulo] || null;
      if (url) {
        botoesHTML = `
          <div class="dl-btn-group">
            <a href="${url}" class="dl-btn dl-btn-primary" target="_blank" rel="noopener">⬇ Download</a>
            <a href="${m.slug}.html" class="dl-btn dl-btn-secondary">Saiba mais</a>
          </div>`;
      } else {
        botoesHTML = `
          <div class="dl-btn-group">
            <a href="${m.slug}.html" class="dl-btn dl-btn-primary">Ver página do patch</a>
          </div>
          <div style="font-size:11px;color:var(--muted);margin-top:8px;text-align:center">Link de download disponível em breve</div>`;
      }
    }

    const cardClass = `dl-card${m.featured?" featured":""}${m.premium?" pro":""}`;

    return `
    <div class="${cardClass}">
      <div class="dl-cover">
        ${coverHTML}
        <div class="dl-cover-badge ${m.badge.classe}">${m.badge.texto}</div>
        ${lockHTML}
      </div>
      <div class="dl-body">
        <div class="dl-title">${m.titulo}</div>
        <div class="dl-version">${m.subtitulo}</div>
        <div class="dl-tags">${tagsHTML}</div>
        ${changelogHTML}
        ${reqHTML}
        ${lockedMsgHTML}
        ${botoesHTML}
      </div>
    </div>`;
  }).join("");

  loading.style.display = "none";
  grid.style.display    = "grid";
}

carregarDownloads();
</script>
<script src="navbar-auth.js"></script>
</body>
</html>
