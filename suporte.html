<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suporte | Lumina Interactive</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar">
  <div class="logo"><img src="logo.png" alt="Lumina Interactive" style="height:36px;width:auto;display:block"></div>
  <div class="menu" id="menuDinamico">
    <a href="index.html">Início</a><a href="patches.html">Patchs</a>
    <a href="Comunidade.html">Comunidade</a><a href="plus.html">Lumina Plus</a>
    <a href="login.html" data-auth-link>Login</a>
  </div>
</nav>

<div class="page-wrap">
  <div class="page-hero container">
    <div class="page-hero-label">Ajuda</div>
    <h1>Suporte</h1>
    <p>Abra um chamado e nossa equipe responderá o mais rápido possível.</p>
  </div>

  <div class="section" style="padding-top:0;max-width:680px;margin:0 auto">

    <!-- Formulário de ticket -->
    <div id="blocoForm" style="background:var(--bg3);border:1px solid var(--border);border-radius:24px;padding:40px;margin-bottom:24px">
      <div class="badge" style="margin-bottom:20px">Novo chamado</div>
      <div id="msgErro"    style="display:none;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#ef4444;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px"></div>
      <div id="msgSucesso" style="display:none;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);color:#22c55e;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px"></div>

      <div class="field">
        <label>Seu nome</label>
        <input type="text" id="sNome" placeholder="Nome completo">
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="sEmail" placeholder="seuemail@gmail.com">
      </div>
      <div class="field">
        <label>Assunto</label>
        <select id="sAssunto">
          <option value="">Selecione o assunto</option>
          <option>Problema com download</option>
          <option>Assinatura não ativada</option>
          <option>Problema com pagamento</option>
          <option>Erro no site</option>
          <option>Dúvida sobre o produto</option>
          <option>Outro</option>
        </select>
      </div>
      <div class="field">
        <label>Mensagem</label>
        <textarea id="sMensagem" rows="5" placeholder="Descreva seu problema ou dúvida em detalhes..." style="resize:vertical"></textarea>
      </div>
      <button class="btn primary" id="btnEnviar" style="width:100%" onclick="enviarTicket()">Enviar chamado</button>
    </div>

    <!-- Meus tickets -->
    <div id="blocoTickets" style="display:none">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;margin-bottom:16px">Meus chamados</div>
      <div id="listaTickets"></div>
    </div>


  </div>
</div>

<footer class="footer">
  <div class="footer-logo"><img src="logo.png" alt="Lumina Interactive" style="height:32px;width:auto;opacity:0.85"></div>
  <div class="footer-links" id="footerDinamico">
    <a href="index.html">Início</a><a href="patches.html">Patchs</a>
    <a href="Comunidade.html">Comunidade</a><a href="plus.html">Lumina Plus</a>
  </div>
  <div class="footer-copy">© 2026 Lumina Interactive™. Todos os direitos reservados.</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const supabaseClient = supabase.createClient(
  "https://tqsalhscgkepttbczyjq.supabase.co",
  "sb_publishable_Q99EhX_HpUVotGGqmWAf4A_pkiTB7bK"
);

// Pré-preenche email se logado
window.addEventListener("DOMContentLoaded", async () => {
  const email = localStorage.getItem("lumina_email");
  if (email) {
    document.getElementById("sEmail").value = email;
    carregarTickets(email);
  }
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session?.user) {
    const meta = session.user.user_metadata || {};
    if (meta.nome) document.getElementById("sNome").value = meta.nome;
    document.getElementById("sEmail").value = session.user.email;
    carregarTickets(session.user.email);
  }
});

async function enviarTicket() {
  const nome     = document.getElementById("sNome").value.trim();
  const email    = document.getElementById("sEmail").value.trim();
  const assunto  = document.getElementById("sAssunto").value;
  const mensagem = document.getElementById("sMensagem").value.trim();
  const btn      = document.getElementById("btnEnviar");
  const erroEl   = document.getElementById("msgErro");
  const sucEl    = document.getElementById("msgSucesso");
  erroEl.style.display = "none"; sucEl.style.display = "none";

  if (!nome)     { erroEl.textContent="Digite seu nome.";       erroEl.style.display="block"; return; }
  if (!email)    { erroEl.textContent="Digite seu e-mail.";     erroEl.style.display="block"; return; }
  if (!assunto)  { erroEl.textContent="Selecione um assunto.";  erroEl.style.display="block"; return; }
  if (!mensagem) { erroEl.textContent="Digite sua mensagem.";   erroEl.style.display="block"; return; }

  btn.textContent = "Enviando..."; btn.disabled = true;

  const { error } = await supabaseClient.from("tickets").insert([{
    nome, email, assunto, mensagem, status: "aberto",
    criado_em: new Date().toISOString()
  }]);

  btn.textContent = "Enviar chamado"; btn.disabled = false;

  if (error) { erroEl.textContent = "Erro: " + error.message; erroEl.style.display = "block"; return; }

  sucEl.textContent = "Chamado enviado! Nossa equipe responderá em breve.";
  sucEl.style.display = "block";
  document.getElementById("sAssunto").value = "";
  document.getElementById("sMensagem").value = "";
  carregarTickets(email);
}

async function carregarTickets(email) {
  const { data, error } = await supabaseClient
    .from("tickets").select("*").eq("email", email).order("criado_em", { ascending: false });
  if (error || !data || !data.length) return;

  document.getElementById("blocoTickets").style.display = "block";
  const lista = document.getElementById("listaTickets");
  lista.innerHTML = "";
  data.forEach(t => {
    let cor = t.status === "resolvido" ? "#22c55e" : t.status === "respondido" ? "#6aabff" : "#fbbf24";
    let bg  = t.status === "resolvido" ? "rgba(34,197,94,0.1)" : t.status === "respondido" ? "rgba(26,107,255,0.1)" : "rgba(251,191,36,0.1)";
    lista.innerHTML += `
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px">
        <div style="font-weight:600;font-size:14px">${t.assunto}</div>
        <span style="background:${bg};color:${cor};border:1px solid ${cor}33;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase">${t.status}</span>
      </div>
      <div style="font-size:13px;color:#94a3b8;margin-bottom:${t.resposta?'12px':'0'}">${t.mensagem}</div>
      ${t.resposta ? `
      <div style="background:var(--bg2);border-left:3px solid var(--blue);border-radius:8px;padding:12px;margin-top:8px">
        <div style="font-size:11px;font-weight:700;color:#6aabff;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Resposta da equipe</div>
        <div style="font-size:13px;color:var(--text)">${t.resposta}</div>
      </div>` : ''}
      <div style="font-size:11px;color:var(--muted);margin-top:10px">${new Date(t.criado_em).toLocaleDateString("pt-BR")} às ${new Date(t.criado_em).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}</div>
    </div>`;
  });
}
</script>
<script src="site-nav.js"></script>
<script src="navbar-auth.js"></script>
</body>
</html>
