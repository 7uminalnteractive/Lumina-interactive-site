<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Lumina Interactive</title>
<link rel="stylesheet" href="style.css">
<style>
  .login-wrap {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  .login-card {
    background: #081226;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 28px;
    padding: 44px 40px;
    width: 100%;
    max-width: 460px;
    box-shadow: 0 0 60px rgba(37,99,235,0.12);
  }
  .login-card h1 {
    font-size: 32px;
    margin-bottom: 8px;
  }
  .login-card .sub {
    color: #64748b;
    font-size: 15px;
    margin-bottom: 32px;
  }
  .tab-row {
    display: flex;
    gap: 0;
    margin-bottom: 28px;
    background: #0f172a;
    border-radius: 14px;
    padding: 4px;
  }
  .tab-btn {
    flex: 1;
    padding: 12px;
    border: none;
    background: transparent;
    color: #64748b;
    font-size: 15px;
    font-weight: 700;
    border-radius: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: #2563eb;
    color: white;
    box-shadow: 0 0 20px rgba(37,99,235,0.35);
  }
  .field {
    margin-bottom: 18px;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .field label {
    font-size: 13px;
    font-weight: 700;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .field input {
    background: #0f172a;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 15px 18px;
    color: white;
    font-size: 16px;
    width: 100%;
    transition: 0.2s;
    box-sizing: border-box;
  }
  .field input:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }
  .btn-full {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 700;
    background: #2563eb;
    color: white;
    border: none;
    cursor: pointer;
    transition: 0.2s;
    margin-top: 6px;
    box-shadow: 0 0 24px rgba(37,99,235,0.35);
  }
  .btn-full:hover { background: #1d4ed8; }
  .btn-full:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-google {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    background: transparent;
    color: white;
    border: 1px solid rgba(255,255,255,0.15);
    cursor: pointer;
    transition: 0.2s;
    margin-top: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .btn-google:hover { background: rgba(255,255,255,0.05); }
  .divider {
    text-align: center;
    color: #334155;
    margin: 18px 0;
    font-size: 13px;
    position: relative;
  }
  .divider::before, .divider::after {
    content: "";
    position: absolute;
    top: 50%;
    width: 42%;
    height: 1px;
    background: rgba(255,255,255,0.07);
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }
  .msg {
    padding: 13px 16px;
    border-radius: 12px;
    font-size: 14px;
    margin-bottom: 18px;
    display: none;
  }
  .msg.error {
    background: rgba(220,38,38,0.15);
    border: 1px solid rgba(220,38,38,0.3);
    color: #fca5a5;
    display: block;
  }
  .msg.success {
    background: rgba(34,197,94,0.15);
    border: 1px solid rgba(34,197,94,0.3);
    color: #86efac;
    display: block;
  }
</style>
</head>
<body>

<nav class="navbar">
  <div class="logo">LUMINA INTERACTIVE™</div>
</nav>

<div class="login-wrap">
<div class="login-card">
  <h1>Bem-vindo</h1>
  <p class="sub">Entre na sua conta Lumina Interactive.</p>

  <div class="tab-row">
    <button class="tab-btn active" id="tabLogin" onclick="setTab('login')">Entrar</button>
    <button class="tab-btn" id="tabRegistro" onclick="setTab('registro')">Criar conta</button>
  </div>

  <div id="msgArea"></div>

  <div class="field">
    <label>E-mail</label>
    <input type="email" id="email" placeholder="seuemail@gmail.com" autocomplete="email">
  </div>

  <div class="field">
    <label>Senha</label>
    <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password">
  </div>

  <button class="btn-full" id="btnAcao" onclick="executarAcao()">Entrar</button>

  <div class="divider">ou</div>

  <button class="btn-google" onclick="loginGoogle()">
    <svg width="20" height="20" viewBox="0 0 48 48">
      <path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 2.9l5.7-5.7C34 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 20-9 20-20 0-1.3-.1-2.7-.4-4z"/>
      <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16 19 12 24 12c3.1 0 5.8 1.1 7.9 2.9l5.7-5.7C34 6.5 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/>
      <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.4-5.1l-6.2-5.2C29.4 35.5 26.8 36 24 36c-5.2 0-9.6-3.1-11.3-7.5l-6.6 4.8C9.7 39.6 16.3 44 24 44z"/>
      <path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.7l6.2 5.2C40.9 35.6 44 30.2 44 24c0-1.3-.1-2.7-.4-4z"/>
    </svg>
    Entrar com Google
  </button>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://tqsalhscgkepttbczyjq.supabase.co";
const SUPABASE_KEY = "sb_publishable_Q99EhX_HpUVotGGqmWAf4A_pkiTB7bK";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let modoAtual = "login";

// Se já está logado, vai direto pra conta
client.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = "minha-conta.html";
});

function setTab(modo) {
  modoAtual = modo;
  document.getElementById("msgArea").innerHTML = "";
  const btnAcao = document.getElementById("btnAcao");
  const tabLogin = document.getElementById("tabLogin");
  const tabRegistro = document.getElementById("tabRegistro");

  if (modo === "login") {
    tabLogin.classList.add("active");
    tabRegistro.classList.remove("active");
    btnAcao.textContent = "Entrar";
  } else {
    tabRegistro.classList.add("active");
    tabLogin.classList.remove("active");
    btnAcao.textContent = "Criar conta";
  }
}

function showMsg(texto, tipo) {
  const area = document.getElementById("msgArea");
  area.innerHTML = `<div class="msg ${tipo}">${texto}</div>`;
}

async function executarAcao() {
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value;
  const btn = document.getElementById("btnAcao");

  if (!email || !senha) {
    showMsg("Preencha e-mail e senha.", "error");
    return;
  }

  btn.disabled = true;
  btn.textContent = "Aguarde...";
  document.getElementById("msgArea").innerHTML = "";

  try {
    if (modoAtual === "login") {
      const { data, error } = await client.auth.signInWithPassword({ email, password: senha });

      if (error) {
        // Mensagens amigáveis em português
        let msg = error.message;
        if (msg.includes("Invalid login credentials")) msg = "E-mail ou senha incorretos.";
        if (msg.includes("Email not confirmed")) msg = "Confirme seu e-mail antes de entrar.";
        showMsg(msg, "error");
        btn.disabled = false;
        btn.textContent = "Entrar";
        return;
      }

      // Login feito — redireciona
      window.location.href = "minha-conta.html";

    } else {
      // Registro
      const { error } = await client.auth.signUp({
        email,
        password: senha,
        options: { emailRedirectTo: window.location.origin + "/minha-conta.html" }
      });

      if (error) {
        let msg = error.message;
        if (msg.includes("already registered")) msg = "Este e-mail já está cadastrado. Faça login.";
        if (msg.includes("Password should be at least")) msg = "A senha precisa ter ao menos 6 caracteres.";
        showMsg(msg, "error");
        btn.disabled = false;
        btn.textContent = "Criar conta";
        return;
      }

      showMsg("Conta criada! Verifique seu e-mail para confirmar e depois faça login.", "success");
      setTab("login");
    }
  } catch (e) {
    showMsg("Erro inesperado. Tente novamente.", "error");
    btn.disabled = false;
    btn.textContent = modoAtual === "login" ? "Entrar" : "Criar conta";
  }
}

async function loginGoogle() {
  const { error } = await client.auth.signInWithOAuth({
    provider: "google",
    options: { redirectTo: window.location.origin + "/minha-conta.html" }
  });
  if (error) showMsg(error.message, "error");
}

// Enter para submeter
document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") executarAcao();
});
</script>
</body>
</html>
