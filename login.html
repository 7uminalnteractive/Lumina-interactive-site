<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Lumina Interactive</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar">

<div class="logo">
LUMINA INTERACTIVE™
</div>

<div class="menu">

<a href="index.html">
Início
</a>

<a href="patches.html">
Patchs
</a>

<a href="plus.html">
Lumina Plus
</a>

<a href="minha-conta.html">
Minha conta
</a>

</div>

</nav>

<main class="container">

<section>

<div
class="form-card"
style="
max-width:500px;
margin:auto;
"
>

<h2>
Entrar na Lumina
</h2>

<p style="
color:var(--muted);
margin-bottom:25px;
">

Entre na sua conta para acessar
suas assinaturas e downloads.

</p>

<label>
E-mail
</label>

<input
type="email"
id="email"
placeholder="seuemail@gmail.com"
>

<label>
Senha
</label>

<input
type="password"
id="senha"
placeholder="Sua senha"
>

<div style="
display:flex;
flex-direction:column;
gap:12px;
margin-top:20px;
">

<button
class="btn primary"
onclick="entrar()"
>

Entrar

</button>

<button
class="btn secondary"
onclick="criarConta()"
>

Registrar conta

</button>

<button
class="btn primary"
onclick="loginGoogle()"
>

Entrar com Google

</button>

</div>

</div>

</section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const SUPABASE_URL =
"https://tqsalhscgkepttbczyjq.supabase.co";

const SUPABASE_KEY =
"sb_publishable_Q99EhX_HpUVotGGqmWAf4A_pkiTB7bK";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

async function criarConta(){

const email =
document.getElementById("email").value;

const senha =
document.getElementById("senha").value;

const { error } =
await supabaseClient.auth.signUp({

email,
password:senha

});

if(error){

alert(error.message);
return;

}

alert(
"Conta criada com sucesso!"
);

}

async function entrar(){

const email =
document.getElementById("email").value;

const senha =
document.getElementById("senha").value;

const { error } =
await supabaseClient.auth.signInWithPassword({

email,
password:senha

});

if(error){

alert(error.message);
return;

}

window.location.href =
"minha-conta.html";

}

async function loginGoogle(){

const { error } =
await supabaseClient.auth.signInWithOAuth({

provider:"google",

options:{

redirectTo:
window.location.origin +
"/minha-conta.html"

}

});

if(error){

alert(error.message);

}

}

</script>

</body>
</html>
