<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Lumina Interactive</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="forms.css">

</head>

<body>

<nav class="navbar">

<div class="logo">
LUMINA INTERACTIVE™
</div>

<div class="menu">

<a href="index.html">Início</a>
<a href="patches.html">Patchs</a>
<a href="plus.html">Lumina Plus</a>
<a href="minha-conta.html">Minha conta</a>

</div>

</nav>

<main class="container">

<section>

<div class="form-card" style="max-width:520px;margin:auto;">

<h2>
Entrar na Lumina
</h2>

<p>
Entre na sua conta para acessar suas assinaturas e downloads.
</p>

<form id="loginForm">

<div>

<label>E-mail</label>

<input
type="email"
id="email"
placeholder="seuemail@gmail.com"
required
>

</div>

<div>

<label>Senha</label>

<input
type="password"
id="senha"
placeholder="Sua senha"
required
>

</div>

<button class="btn primary" type="submit">
Entrar
</button>

<button
class="btn secondary"
type="button"
onclick="registrar()"
>
Registrar conta
</button>

<button
class="btn primary"
type="button"
onclick="loginGoogle()"
>
Entrar com Google
</button>

</form>

</div>

</section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const SUPABASE_URL =
"https://tqsalhscgkepttbczyjq.supabase.co";

const SUPABASE_KEY =
"sb_publishable_Q99EhX_HpUVotGGqmWAf4A_pkiTB7bK";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

document
.getElementById("loginForm")
.addEventListener(
"submit",
async (e)=>{

e.preventDefault();

const email =
document.getElementById("email").value;

const senha =
document.getElementById("senha").value;

const { error } =
await supabaseClient.auth.signInWithPassword({

email:email,
password:senha

});

if(error){

alert(error.message);
return;

}

window.location.href =
"minha-conta.html";

}
);

async function registrar(){

const email =
document.getElementById("email").value;

const senha =
document.getElementById("senha").value;

if(!email || !senha){

alert(
"Digite e-mail e senha."
);

return;

}

const { error } =
await supabaseClient.auth.signUp({

email:email,
password:senha,

options:{

emailRedirectTo:
window.location.origin +
"/minha-conta.html"

}

});

if(error){

alert(error.message);
return;

}

alert(
"Conta criada com sucesso!"
);

}

async function loginGoogle(){

const { error } =
await supabaseClient.auth.signInWithOAuth({

provider:"google",

options:{

redirectTo:
window.location.origin +
"/minha-conta.html"

}

});

if(error){

alert(error.message);

}

}

</script>

</body>
</html>
