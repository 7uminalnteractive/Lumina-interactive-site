<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Lumina Interactive</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
  <div class="logo">LUMINA INTERACTIVE™</div>
  <div class="menu">
    <a href="index.html">Início</a>
    <a href="minha-conta.html">Minha conta</a>
  </div>
</nav>

<main class="container">
<section>
  <div class="form-card">
    <h2>Entrar na Lumina</h2>

    <label>E-mail</label>
    <input type="email" id="email" placeholder="seuemail@gmail.com">

    <label>Senha</label>
    <input type="password" id="senha" placeholder="Sua senha">

    <button class="btn primary" onclick="entrar()">Entrar</button>
    <button class="btn secondary" onclick="criarConta()">Criar conta</button>
  </div>
</section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="auth.js"></script>

<script>
async function criarConta(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { error } = await supabaseClient.auth.signUp({
    email,
    password: senha
  });

  if(error){
    alert(error.message);
    return;
  }

  alert("Conta criada! Verifique seu e-mail.");
}

async function entrar(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password: senha
  });

  if(error){
    alert(error.message);
    return;
  }

  window.location.href = "minha-conta.html";
}
</script>

</body>
</html>
